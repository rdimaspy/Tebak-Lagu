<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Tebak Lagu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="game-container">
        <h1>🎵 Game Tebak Lagu</h1>

        <div id="setup-section">
            <p style="color: #b0b0b0; font-size: 14px; margin-bottom: 20px; text-align: center;">
                Export playlist Spotify di 
                <a href="https://exportify.app/" target="_blank" rel="noopener noreferrer" style="color: #1DB954; text-decoration: none; font-weight: bold;">Exportify</a> 
                , lalu unggah filenya di bawah untuk mulai bermain:
            </p>

            <div class="input-option-block" style="background: #222; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #333;">
                <input type="file" id="csv-file" accept="*" style="width: 100%; color: white; font-size: 14px;">
            </div>

            <button id="btn-start" style="width: 100%;">Mulai Game</button>
        </div>

        <div id="game-section" class="hidden">
            <div class="game-info">
                <p id="total-songs">Total Lagu: 0</p>
                <p id="remaining-songs">Sisa Lagu: 0/0</p>
                <p id="lives-counter">Kesempatan: 10/10</p>
            </div>
            
            <div class="game-stats" style="display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; color: #b0b0b0;">
                <p>✅ Benar: <span id="correct-counter" style="color: #a8e6cf; font-weight: bold;">0</span></p>
                <p>❌ Salah: <span id="wrong-counter" style="color: #ffaaa6; font-weight: bold;">0</span></p>
            </div>

            <audio id="audio-player" class="hidden-player"></audio>

            <div class="audio-control">
                <button id="btn-play">▶️ Dengarkan (<span id="current-duration">1</span>s)</button>
            </div>

            <div class="guess-control">
                <input type="text" id="guess-input" placeholder="Ketik judul lagu di sini..." autocomplete="one-time-code" autocapitalize="off" spellcheck="false" disabled>
                <div class="button-group">
                    <button id="btn-submit" disabled>Submit</button>
                    <button id="btn-skip" disabled>Skip</button>
                </div>
            </div>

            <div id="song-detail" class="hidden">
                <hr>
                <img id="album-cover" src="" alt="Cover Lagu" style="max-width: 150px; border-radius: 8px; margin-bottom: 10px;">
                <h3 id="song-title">Judul Lagu</h3>
                <p id="song-artist" style="color: #b0b0b0; margin-bottom: 15px;">Nama Artis</p>
                <button id="btn-next">Lagu Selanjutnya ➡️</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
